repo: vbomfim/openasr
branch: main
provider: github
schedule:
  merge_monitor: on_push
  coverage_scan: 0 8 * * *
  tech_debt_audit: 0 9 * * 1
  dependency_check: 0 10 * * 1
  pr_monitor: 0 */2 * * *
capabilities:
  merge_review: true
  coverage_gaps: true
  bug_detection: true
  pattern_enforcement: true
  po_audit: true
  auto_fix: true
  dependency_updates: true
  pr_monitor: true
  delivery_audit: true
  auto_develop: false
  platform_audit: true
  autonomous_workflow: true
models:
  code_review:
    - claude-opus-4.6
    - gpt-5.4
  security: claude-opus-4.6
  default: claude-opus-4.6
autonomy:
  create_issues: true
  create_draft_prs: true
  auto_merge: false
guardians:
  path: ~/.copilot/
