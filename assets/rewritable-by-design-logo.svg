<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" fill="none">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0088CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="200" rx="16" fill="#0d1117"/>

  <!-- Main text -->
  <text x="350" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#grad3)" letter-spacing="-1">
    Rewritable by Design
  </text>

  <!-- Tagline -->
  <text x="350" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#58a6ff" letter-spacing="0.5">
    Boundaries and contracts are permanent. Implementations are replaceable.
  </text>

  <!-- Subtitle -->
  <text x="350" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#484f58" letter-spacing="2">
    This is when AI meets Software Engineering.
  </text>
</svg>
